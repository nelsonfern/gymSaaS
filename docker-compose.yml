version: "3.9"

services:
  server:
    build: ./server
    container_name: gymsaas_server
    restart: always
    ports:
      - "5100:5100"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: gymsaas_client
    restart: always
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules